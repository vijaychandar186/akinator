services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: akinator
      POSTGRES_USER: akinator
      POSTGRES_PASSWORD: akinator
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U akinator"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: python main.py serve --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql://akinator:akinator@db:5432/akinator
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
